name: Run Tests + CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest

      # CD
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tic-tac-toe-build
          path: .